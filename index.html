<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Chegoou | Portais</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        .logo { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo i { color: #38bdf8; font-size: 3rem; }
        .grid { display: grid; gap: 16px; }
        .card { background: #1e293b; padding: 24px; border-radius: 12px; text-decoration: none; color: #fff; border: 1px solid #334155; transition: 0.2s; display: flex; align-items: center; gap: 16px; }
        .card:hover { border-color: #38bdf8; transform: translateY(-2px); background: #2dd4bf10; }
        .icon-box { background: #0f172a; width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #38bdf8; }
        .text-box { text-align: left; }
        .title { font-weight: 600; font-size: 1.1rem; display: block; margin-bottom: 4px;}
        .desc { font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="ph ph-buildings"></i> Hey Chegoou</div>
        <div class="grid">
            <a href="./admin/" class="card">
                <div class="icon-box"><i class="ph ph-desktop"></i></div>
                <div class="text-box">
                    <span class="title">Painel Admin / Síndico</span>
                    <span class="desc">Gestão completa de encomendas e base de dados.</span>
                </div>
            </a>
            <a href="./portaria/" class="card">
                <div class="icon-box"><i class="ph ph-device-mobile"></i></div>
                <div class="text-box">
                    <span class="title">App da Portaria</span>
                    <span class="desc">Bipagem, fotos e baixa de pacotes no telemóvel.</span>
                </div>
            </a>
            <a href="./morador/" class="card">
                <div class="icon-box"><i class="ph ph-user"></i></div>
                <div class="text-box">
                    <span class="title">App do Morador</span>
                    <span class="desc">Acompanhe suas encomendas e gere códigos de retirada.</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
